name: Coastal Target Correction

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Coastal Targets Download"]
    types:
      - completed

jobs:
  r-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      OSN_KEY: ${{ secrets.OSN_KEY }}
      OSN_SECRET: ${{ secrets.OSN_SECRET }}

    container: eco4cast/rocker-neon4cast:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install R packages
        run: |
          Rscript -e 'options(repos=c(CRAN="https://cloud.r-project.org"))'
          Rscript -e 'pkgs <- c("arrow","dplyr","lubridate","tidyr","yaml","RCurl"); need <- pkgs[!pkgs %in% rownames(installed.packages())]; if(length(need)) install.packages(need, Ncpus = 2)'

      - name: Run Coastal Targets Correction Script
        run: |
          Rscript targets/coastal_targets_corrected.R
