# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:


name: Drivers Stage 1 & 2

jobs:
  docker:
    runs-on: ubuntu-latest 
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OSN_KEY: ${{ secrets.OSN_KEY }}
      OSN_SECRET: ${{ secrets.OSN_SECRET }}
    container: eco4cast/rocker-neon4cast:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install
        shell: Rscript {0}
        run: |
          remotes::install_version('arrow', version = '20.0.0')

      - name: Update GEFS
        shell: Rscript {0}
        run: |
          source("drivers/download_stage1.R")

      - name: Generate stage 2
        shell: Rscript {0}
        run: |
          source("drivers/generate_stage2.R")

      - name: Healthcheck
        run: |
          curl -m 10 --retry 5 https://hc-ping.com/d7a40551-9b1f-4875-a5e3-72bdabb631eb

