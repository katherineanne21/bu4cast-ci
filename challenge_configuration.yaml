#TARGET CONFIGURATIONS
target_groups:
  Urban:
    target_name: "urban"
    targets_filepath: "challenges/project_id=bu4cast/targets/urban-targets.csv"
    site_metadata_filepath: "bu4cast-ci-read/challenges/project_id=bu4cast/metadata/urban-targets-sites.csv"
    units_metadata_filepath: "bu4cast-ci-read/challenges/project_id=bu4cast/metadata/urban-targets-units.csv"
    targets_weblink: "https://minio-s3.apps.shift.nerc.mghpcc.org/bu4cast-ci-read/challenges/project_id=bu4cast/targets/urban-targets.csv"
    targets_sites_weblink: "https://minio-s3.apps.shift.nerc.mghpcc.org/bu4cast-ci-read/challenges/project_id=bu4cast/metadata/urban-targets-sites.csv"
    targets_units_weblink: "https://minio-s3.apps.shift.nerc.mghpcc.org/bu4cast-ci-read/challenges/project_id=bu4cast/metadata/urban-targets-units.csv"
    variable: ['PM2.5_P1H','PM2.5_P1D','PM10_P1H','PM10_P1D','NO2_P1H','NO2_P1D','O3']
    #max_horizon: [35, 35, 35]
    duration: ['PT1H','P1D','PT1H','P1D','PT1H','P1D','PT1H']
    #thumbnail_link: 'https://www.neonscience.org/sites/default/files/styles/_edit_list_additional_actions_max_width_300/public/image-content-images/06092015-BarcoBuoy-400.jpg?itok=t1xTVkX3'
    #thumbnail_title: 'NEON Aquatics Buoy'
    #group_vars:
      #oxygen:
        #duration: "P1D"
        #max_horizon: 35
        #var_doi: "10.1002/eap.70004"
        #var_citation: "Olsson, F., C.C. Carey, C. Boettiger, G. Harrison, R. Ladwig, M.F. Lapeyrolerie, A.S.L. Lewis, M.E. Lofton, F. Motealegre-Mora, J.S. Rebaey, C.J. Robbins. X. Yang, and R.Q. Thomas. 2025. What can we learn from 100,000 freshwater forecasts? A synthesis from the NEON Ecological Forecasting Challenge. Ecological Applications 35:e70004 https://doi.org/10.1002/eap.70004"
      #temperature:
        #duration: 'P1D'
        #max_horizon: 35
        #var_doi: "10.1002/eap.70004"
        #var_citation: "Olsson, F., C.C. Carey, C. Boettiger, G. Harrison, R. Ladwig, M.F. Lapeyrolerie, A.S.L. Lewis, M.E. Lofton, F. Motealegre-Mora, J.S. Rebaey, C.J. Robbins. X. Yang, and R.Q. Thomas. 2025. What can we learn from 100,000 freshwater forecasts? A synthesis from the NEON Ecological Forecasting Challenge. Ecological Applications 35:e70004 https://doi.org/10.1002/eap.70004"
      #chla:
        #duration: "P1D"
        #max_horizon: 35
        #var_doi: "10.1002/eap.70004"
        #var_citation: "Olsson, F., C.C. Carey, C. Boettiger, G. Harrison, R. Ladwig, M.F. Lapeyrolerie, A.S.L. Lewis, M.E. Lofton, F. Motealegre-Mora, J.S. Rebaey, C.J. Robbins. X. Yang, and R.Q. Thomas. 2025. What can we learn from 100,000 freshwater forecasts? A synthesis from the NEON Ecological Forecasting Challenge. Ecological Applications 35:e70004 https://doi.org/10.1002/eap.70004"
  TropicalDisease:
    targets_file: "https://sdsc.osn.xsede.org/bio230014-bucket01/challenges/targets/project_id=neon4cast/duration=P1D/terrestrial_daily-targets.csv.gz"
    variable: ['nee','le']
    duration: ['P1D','P1D']
    max_horizon: [35, 35]
    thumbnail_link: 'https://www.neonscience.org/sites/default/files/styles/640x384/public/2020-10/48540914326_749b0c2627_o.jpg'
    thumbnail_title: 'NEON Field Tower'
    group_vars:
      nee:
        duration: ["P1D"]
        max_horizon: [35]
        var_doi: "None"
        var_citation: "None"
      le:
        duration: ["P1D"]
        max_horizon: [35]
        var_doi: "None"
        var_citation: "None"
  Coastal:
    targets_file: "https://sdsc.osn.xsede.org/bio230014-bucket01/challenges/targets/project_id=neon4cast/duration=P1D/phenology-targets.csv.gz"
    variable: ['gcc_90','rcc_90']
    duration: ['P1D','P1D']
    max_horizon: [35, 35]
    thumbnail_link: 'https://www.neonscience.org/sites/default/files/styles/max_1300x1300/public/image-content-images/_BFP8455.jpg'
    thumbnail_title: 'Phenology Image'
    group_vars:
      gcc_90:
        duration: "P1D"
        max_horizon: 35
        var_doi: '10.1016/j.agrformet.2023.109810.'
        var_citation: 'Kathryn I. Wheeler, Michael C. Dietze, David LeBauer, Jody A. Peters, Andrew D. Richardson, Arun A. Ross, R. Quinn Thomas,
        Kai Zhu, Uttam Bhat, Stephan Munch, Raphaela Floreani Buzbee, Min Chen, Benjamin Goldstein, Jessica Guo, Dalei Hao, Chris Jones, Mira Kelly-Fair,
        Haoran Liu, Charlotte Malmborg, Naresh Neupane, Debasmita Pal, Vaughn Shirey, Yiluan Song, McKalee Steen, Eric A. Vance, Whitney M. Woelmer,
        Jacob H. Wynne, Luke Zachmann, Predicting spring phenology in deciduous broadleaf forests: NEON phenology forecasting community challenge,
        Agricultural and Forest Meteorology, Volume 345, 2024'
noaa_forecasts:
  noaa_forecast_groups: ['Pseudo','Stage1-stats','Stage1','Stage2','Stage3']
  noaa_forecast_group_paths: ['pseudo','stage1-stats','stage1','stage2','stage3']
